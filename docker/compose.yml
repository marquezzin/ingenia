services:
  # ─── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ingenia_db}
      POSTGRES_USER: ${POSTGRES_USER:-ingenia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ingenia_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ingenia_user} -d ${POSTGRES_DB:-ingenia_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run python manage.py runserver 0.0.0.0:8000

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      VITE_API_BASE_URL: ""
    ports:
      - "5173:5173"
      - "8080:8080"
    volumes:
      - ../frontend:/app
    depends_on:
      - backend
    command: sh -c "pnpm install && exec pnpm dev --host"

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A config worker -l info

  # ─── Celery Beat (Scheduler) ────────────────────────────────────────────────
  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A config beat -l info

volumes:
  postgres_data:
