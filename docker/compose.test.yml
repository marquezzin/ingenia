# Override de teste — sobe com DB separado e settings de teste
# Uso: docker compose -f docker/compose.yml -f docker/compose.test.yml up -d

services:
  # ─── Database de Teste (porta 5433, dados em tmpfs) ─────────────────────────
  db_test:
    image: postgres:18-alpine
    restart: "no"
    environment:
      POSTGRES_DB: hub_test_db
      POSTGRES_USER: ingenia_user
      POSTGRES_PASSWORD: ingenia_pass
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ingenia_user -d hub_test_db" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Backend em modo teste ──────────────────────────────────────────────────
  backend:
    env_file:
      - ../.env.test
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      POSTGRES_HOST: db_test
    depends_on:
      db_test:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Override: não sobe o runserver, fica em standby para exec
    command: tail -f /dev/null

  # ─── Frontend em modo teste ─────────────────────────────────────────────────
  frontend:
    env_file:
      - ../.env.test
    depends_on:
      - backend

  # ─── Celery (desabilitado em testes) ────────────────────────────────────────
  celery_worker:
    profiles:
      - disabled

  celery_beat:
    profiles:
      - disabled
